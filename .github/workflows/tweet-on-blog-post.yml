name: Tweet on new blog post

on:
  push:
    branches:
      - main
    paths:
      - 'src/data/blog-posts.ts'
      - 'src/data/study-blog-posts.ts'

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          pip install requests requests-oauthlib

          python3 << 'PYTHON'
          import os
          import subprocess
          import re
          from requests_oauthlib import OAuth1Session

          changed = subprocess.check_output(
              ["git", "diff", "HEAD~1", "HEAD", "--name-only"],
              text=True
          )

          tweet_text = None

          if "blog-posts.ts" in changed:
              diff = subprocess.check_output(
                  ["git", "diff", "HEAD~1", "HEAD", "--", "src/data/blog-posts.ts"],
                  text=True
              )
              slugs = re.findall(r'^\+\s+slug:\s+"([^"]+)"', diff, re.MULTILINE)
              titles = re.findall(r'^\+\s+ja:\s+"([^"]+)"', diff, re.MULTILINE)
              if slugs and titles:
                  slug = slugs[0]
                  title = titles[0]
                  tweet_text = f"{title}\n\nhttps://www.moveworthapp.com/blog/{slug}\n\n#\u6d77\u5916\u79fb\u4f4f #\u6d77\u5916\u751f\u6d3b #\u79fb\u4f4f\u8a08\u753b"

          if "study-blog-posts.ts" in changed and tweet_text is None:
              diff = subprocess.check_output(
                  ["git", "diff", "HEAD~1", "HEAD", "--", "src/data/study-blog-posts.ts"],
                  text=True
              )
              slugs = re.findall(r'^\+\s+slug:\s+"([^"]+)"', diff, re.MULTILINE)
              titles = re.findall(r'^\+\s+ja:\s+"([^"]+)"', diff, re.MULTILINE)
              if slugs and titles:
                  slug = slugs[0]
                  title = titles[0]
                  tweet_text = f"{title}\n\nhttps://study.moveworthapp.com/blog/{slug}\n\n#\u6d77\u5916\u7559\u5b66 #\u30ef\u30fc\u30db\u30ea #\u7559\u5b66\u6e96\u5099"

          if tweet_text is None:
              print("No new blog post detected, skipping tweet.")
              exit(0)

          print(f"Tweeting:\n{tweet_text}")

          oauth = OAuth1Session(
              os.environ["X_API_KEY"],
              client_secret=os.environ["X_API_SECRET"],
              resource_owner_key=os.environ["X_ACCESS_TOKEN"],
              resource_owner_secret=os.environ["X_ACCESS_TOKEN_SECRET"],
          )

          response = oauth.post(
              "https://api.twitter.com/2/tweets",
              json={"text": tweet_text},
          )

          if response.status_code == 201:
              print("Tweet posted successfully!")
          else:
              print(f"Error: {response.status_code} - {response.text}")
              exit(1)
          PYTHON
