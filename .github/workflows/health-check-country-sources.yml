name: Health Check — Country Sources

on:
  schedule:
    # 週次: 毎週土曜 01:00 UTC (10:00 JST) — auto-country (水・日) と重複なし
    - cron: "0 1 * * 6"
    # 月次: 毎月1日 02:00 UTC — unverified の再試行含む全件チェック
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "recheck-dead | recheck-unverified | recheck-all | re-verify"
        required: false
        default: "recheck-dead"

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Weekly — recheck dead + unverified
        if: github.event_name == 'schedule' && contains(github.event.schedule, '* * 6')
        run: npx tsx scripts/verify-country-sources.ts --recheck-dead --recheck-unverified
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Monthly — full re-verify (all statuses)
        if: github.event_name == 'schedule' && contains(github.event.schedule, '1 * *')
        run: npx tsx scripts/verify-country-sources.ts --recheck-dead --recheck-unverified --re-verify
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "recheck-dead" ]; then
            npx tsx scripts/verify-country-sources.ts --recheck-dead
          elif [ "$MODE" = "recheck-unverified" ]; then
            npx tsx scripts/verify-country-sources.ts --recheck-unverified
          elif [ "$MODE" = "recheck-all" ]; then
            npx tsx scripts/verify-country-sources.ts --recheck-dead --recheck-unverified
          elif [ "$MODE" = "re-verify" ]; then
            npx tsx scripts/verify-country-sources.ts --re-verify
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Create GitHub Issue on dead URL detection
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[country-sources] dead URL 検出 — ${date}`,
              body: [
                '## country_sources ヘルスチェックで dead URL を検出しました',
                '',
                '**対応手順:**',
                '1. GitHub Actions のログで dead URL 一覧を確認',
                '2. `scripts/verify-country-sources.ts --recheck-dead` を手動実行して詳細確認',
                '3. 置換 URL を特定して `country_sources` を `source=manual` で更新',
                '4. 該当記事の参考文献欄を差し替え',
                '',
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['bug', 'content'],
            });
