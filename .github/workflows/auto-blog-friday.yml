name: Auto Blog Post (Friday — Lifeplan, odd weeks)

on:
  schedule:
    # 金曜 09:00 JST (00:00 UTC) に実行
    # 奇数週のみ lifeplan を生成（偶数週は simulator が動くのでスキップ）
    - cron: "0 0 * * 5"
  workflow_dispatch:
    inputs:
      force_run:
        description: "true にすると週番号チェックを無視して強制実行"
        required: false
        default: "false"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check ISO week (odd = lifeplan, even = skip)
        id: week
        run: |
          WEEK=$(date +%V)
          REMAINDER=$((WEEK % 2))
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "強制実行モード (Week $WEEK)"
          elif [ "$REMAINDER" -eq 1 ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Week $WEEK (奇数) = ライフプラン生成"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭ Week $WEEK (偶数) = simulator 週のためスキップ"
          fi

      - name: Generate lifeplan article
        if: steps.week.outputs.skip != 'true'
        run: npx tsx scripts/generate-blog-post.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISABLE_CASESTUDY: "true"
          FORCE_CATEGORY: lifeplan

      - name: Trigger Vercel redeploy
        if: steps.week.outputs.skip != 'true'
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
