name: Publish Study Work Article (Saturday)

on:
  schedule:
    # 土曜 09:00 JST (00:00 UTC) に実行
    # 5日前（月曜）公開された visa-{code} と同国の就労記事を公開
    # 優先: study-work-{code} → フォールバック: study-{code}
    - cron: "0 0 * * 6"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Publish study-work article
        run: npx tsx scripts/publish-study-work-next.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Trigger Vercel redeploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
