name: Auto Country Article

on:
  schedule:
    # 日曜 09:00 JST (00:00 UTC) に実行（月曜公開の前日に draft 生成）
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate country articles
        run: npx tsx scripts/generate-country-article.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit country count text changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/messages/ja.json src/messages/en.json src/messages/zh.json \
                  src/app/layout.tsx src/app/simulate/layout.tsx \
                  src/app/study-site/page.tsx "src/app/study-site/[country]/page.tsx"
          if git diff --staged --quiet; then
            echo "No country count changes to commit."
          else
            git commit -m "chore: update country count text"
            git push
          fi

      - name: Trigger Vercel redeploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
